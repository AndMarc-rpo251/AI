<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер - игра</title>
    <style>
        /* ЧАСТЬ 1: СТИЛИ CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .score-box {
            background: #f0f4f8;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .score-label {
            font-size: 1.2rem;
            color: #666;
        }

        .score-value {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            line-height: 1.2;
        }

        .click-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .click-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .click-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.5);
        }

        .click-button:active {
            transform: scale(0.95);
        }

        .shop {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .shop-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .shop-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .shop-item h3 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .shop-item p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .buy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: background 0.3s;
        }

        .buy-btn:hover:not(:disabled) {
            background: #218838;
        }

        .buy-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: background 0.3s;
        }

        .reset-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <!-- ЧАСТЬ 2: HTML СТРУКТУРА -->
    <div class="game-container">
        <h1>🍪 Кликер</h1>
        
        <div class="score-box">
            <div class="score-label">Очки:</div>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>

        <div class="click-area">
            <button class="click-button" id="clickBtn">👆</button>
        </div>

        <div class="shop">
            <div class="shop-item">
                <h3>👆 +1 за клик</h3>
                <p>Цена: 10 очков</p>
                <button class="buy-btn" id="upgrade1">Купить</button>
            </div>
            <div class="shop-item">
                <h3>⚡ +5 за клик</h3>
                <p>Цена: 50 очков</p>
                <button class="buy-btn" id="upgrade2">Купить</button>
            </div>
        </div>

        <button class="reset-btn" id="resetBtn">🔄 Новая игра</button>
    </div>

    <!-- ЧАСТЬ 3: JAVASCRIPT ЛОГИКА -->
    <script>
        // Состояние игры
        let score = 0;
        let clickValue = 1;
        let upgrade1Cost = 10;
        let upgrade2Cost = 50;
        
        // DOM элементы
        const scoreDisplay = document.getElementById('scoreDisplay');
        const clickBtn = document.getElementById('clickBtn');
        const upgrade1Btn = document.getElementById('upgrade1');
        const upgrade2Btn = document.getElementById('upgrade2');
        const resetBtn = document.getElementById('resetBtn');

        // Обновление интерфейса
        function updateUI() {
            scoreDisplay.textContent = score;
            upgrade1Btn.disabled = score < upgrade1Cost;
            upgrade2Btn.disabled = score < upgrade2Cost;
        }

        // Обработка клика
        clickBtn.addEventListener('click', () => {
            score += clickValue;
            updateUI();
            
            // Анимация при клике
            clickBtn.style.transform = 'scale(0.9)';
            setTimeout(() => {
                clickBtn.style.transform = 'scale(1)';
            }, 100);
        });

        // Улучшение 1 (+1 за клик)
        upgrade1Btn.addEventListener('click', () => {
            if (score >= upgrade1Cost) {
                score -= upgrade1Cost;
                clickValue += 1;
                upgrade1Cost = Math.floor(upgrade1Cost * 1.5);
                upgrade1Btn.textContent = `Купить (${upgrade1Cost})`;
                updateUI();
                
                // Визуальный эффект
                upgrade1Btn.style.background = '#ffc107';
                setTimeout(() => {
                    upgrade1Btn.style.background = '#28a745';
                }, 200);
            }
        });

        // Улучшение 2 (+5 за клик)
        upgrade2Btn.addEventListener('click', () => {
            if (score >= upgrade2Cost) {
                score -= upgrade2Cost;
                clickValue += 5;
                upgrade2Cost = Math.floor(upgrade2Cost * 1.8);
                upgrade2Btn.textContent = `Купить (${upgrade2Cost})`;
                updateUI();
                
                // Визуальный эффект
                upgrade2Btn.style.background = '#ffc107';
                setTimeout(() => {
                    upgrade2Btn.style.background = '#28a745';
                }, 200);
            }
        });

        // Сброс игры
        resetBtn.addEventListener('click', () => {
            if (confirm('Начать новую игру? Весь прогресс будет потерян.')) {
                score = 0;
                clickValue = 1;
                upgrade1Cost = 10;
                upgrade2Cost = 50;
                upgrade1Btn.textContent = 'Купить';
                upgrade2Btn.textContent = 'Купить';
                updateUI();
                
                // Анимация сброса
                resetBtn.style.background = '#ffc107';
                setTimeout(() => {
                    resetBtn.style.background = '#dc3545';
                }, 200);
            }
        });

        // Инициализация
        updateUI();
    </script>
</body>
</html>
